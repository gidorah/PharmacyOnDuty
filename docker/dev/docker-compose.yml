services:
  django:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    ports:
      - "${DJANGO_HOST_PORT:-8000}:8000"
      - "${REMOTE_DEBUGGING_HOST_PORT:-5678}:5678"
    volumes:
      - .:/app
    environment:
      - REMOTE_DEBUGGING_PORT=5678
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DB_HOST=db
      - DJANGO_SETTINGS_MODULE=PharmacyOnDuty.settings
      - RUN_MIGRATIONS=true

  db:
    build:
      context: .
      dockerfile: docker/postgis/Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gis
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  worker:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    command: sh -c "uv sync && uv run celery -A PharmacyOnDuty worker -l info --hostname=scraper@%%h"
    environment:
      - DJANGO_SETTINGS_MODULE=PharmacyOnDuty.settings
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DB_HOST=db
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  beat:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    command: sh -c "uv sync && uv run celery -A PharmacyOnDuty beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DB_HOST=db
      - DJANGO_SETTINGS_MODULE=PharmacyOnDuty.settings
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

  flower:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    command: sh -c "uv sync && uv run celery -A PharmacyOnDuty flower --port=5555"
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app

volumes:
  postgis-data:
  redis_data:
