{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="tr">
    <head>
        <title>Nöbetçi Eczaneler | Açık Eczaneler | Eczanerede</title>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y5F4DN577T"></script>
        <script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());

		gtag('config', 'G-Y5F4DN577T');

        <meta name="description"
              content="Keşfedin: Eskişehir’deki, İstanbul'daki ve Ankara'daki size en yakın açık ve nöbetçi eczaneler. Hızlı yol tarifi ve konum bilgileriyle, ihtiyacınız olduğunda en yakın eczaneye kolayca ulaşın.">
        <meta charset="UTF-8" />
        <link rel="icon" href="static/favicon.ico" type="image/x-icon">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta property="og:title"
              content="Nöbetçi Eczaneler | Açık Eczaneler | Eczanerede">
        <meta property="og:description"
              content="Eskişehir’deki, İstanbul'daki ve Ankara'daki size en yakın açık ve nöbetçi eczaneler. Hızlı yol tarifi ve konum bilgileriyle, ihtiyacınız olduğunda en yakın eczaneye kolayca ulaşın.">
        <meta property="og:image"
              content="https://images.seeklogo.com/logo-png/53/1/eczane-logo-png_seeklogo-536923.png">
        <meta property="og:url" content="https://eczanerede.com">
        {% tailwind_css %}
        <!-- htmx -->
        <script src="https://unpkg.com/htmx.org"></script>
        <!-- Google Maps Proxy -->
        <script>
		window.mapsPromise = new Promise((resolve) => {
			window.mapsCallback = () => { resolve(); };
		});
        </script>
        <script src="/google_maps_proxy?loading=async&callback=mapsCallback"
                async
                defer></script>
        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <!-- Hammer.js (CDN) -->
        <script src="https://hammerjs.github.io/dist/hammer.min.js"></script>
    </head>
    <body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
        <div style="display:none;">{% csrf_token %}</div>
        <main class="flex-1 flex flex-col bg-gray-50">
            <div class="flex items-center">
                <div class="h-14 w-14 m-5 flex items-center bg-primary-100 rounded-l relative z-10 border-b border-neutral-400"
                     style="box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5)">
                    <img src="static/icons/eczane-logo.png"
                         alt="Eczanerede - Açık Eczaneler Logosu">
                </div>
                <div class="h-12 px-8 gap-4 flex items-center bg-primary-100 rounded-3xl relative z-10 border-b border-neutral-400"
                     style="box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5)">
                    <span id="selectedPharmacyStatus"
                          class="inline-block text-sm font-medium px-2 py-2 rounded-full bg-secondary border-2 border-secondary text-white">
                    </span>
                    <span id="selectedPharmacyName" class="text-sm font-semibold text-gray-800">Açık Eczaneler Yükleniyor</span>
                </div>
            </div>
            <!-- Map Section -->
            <div id="map"
                 class="fixed top-[calc(-14rem)] left-0 right-0 h-[calc(100vh+2rem)] w-full"></div>
            <!-- Pharmacy List Container -->
            <div id="pharmacy-list-container"
                 class="p-4 bg-primary-100 shadow-slate-600 shadow-lg rounded-t-3xl relative z-20 border-t border-neutral-400 flex flex-col"
                 style="box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5)">
                <div id="handle"
                     onclick="event.stopPropagation()"
                     class="w-12 h-1 bg-gray-400 rounded-full mx-auto mb-2"></div>
                <h1 class="text-xl font-bold mb-4 mt-4">Şu Anda Açık Eczaneler</h1>
                <!-- Scrollable Area -->
                <div id="pharmacy-scrollable-area" class="flex-1 scrollable-area">
                    <div id="pharmacy-items" class="space-y-4">
                        <!-- Pharmacy items will be dynamically inserted here -->
                    </div>
                </div>
                <footer class="bg-gray-100 p-4 text-center">
                    <p class="text-sm">
                        &copy; 2025 Eczanerede |
                        <a href="/privacy-policy/" class="text-blue-600">Gizlilik Politikası</a> |
                        <a href="/terms/" class="text-blue-600">Hizmet Şartları</a> |
                        <a href="/cookie-policy/" class="text-blue-600">Çerez Politikası</a>
                    </p>
                </footer>
            </div>
        </main>
        <!-- Script Logic -->
        <script>
		let map;
		// Lazily-resolved constructors from the Maps JS modular libraries.
		let AdvancedMarkerElementCtor;
		let RouteCtor;
		let LatLngBoundsCtor;
		let userLocation;
		let selectedPharmacy;
		let markersArray = [];
		let routePolylines = [];
		let latestDirectionsId = 0;

		async function initMap(center = { lat: 40.7128, lng: -74.0060 }) {
			// Modular importLibrary: marker → AdvancedMarkerElement,
			// routes → Route.computeRoutes, core → LatLngBounds.
			const [
				{ Map },
				{ AdvancedMarkerElement },
				{ Route },
				{ LatLngBounds },
			] = await Promise.all([
				google.maps.importLibrary("maps"),
				google.maps.importLibrary("marker"),
				google.maps.importLibrary("routes"),
				google.maps.importLibrary("core"),
			]);
			AdvancedMarkerElementCtor = AdvancedMarkerElement;
			RouteCtor = Route;
			LatLngBoundsCtor = LatLngBounds;

			map = new Map(document.getElementById("map"), {
				center: center,
				zoom: 10,
				// AdvancedMarkerElement requires a vector Map ID. The server
				// injects either the configured ID or DEMO_MAP_ID as a fallback.
				mapId: "{{ google_maps_map_id|escapejs }}",
				disableDefaultUI: true,
				zoomControl: false,
				mapTypeControl: false,
				scaleControl: false,
				streetViewControl: false,
				rotateControl: false,
				fullscreenControl: false,
			});
		}

		function buildMarkerContent(iconUrl, alt) {
			const img = document.createElement("img");
			img.src = iconUrl;
			img.alt = alt;
			img.width = 50;
			img.height = 50;
			img.style.transform = "translate(0, 25px)";
			return img;
		}

		function clearRoutePolylines() {
			routePolylines.forEach((polyline) => { polyline.setMap(null); });
			routePolylines = [];
		}

		function invalidateDirections() {
			// Invalidate in-flight computeRoutes so a stale response cannot redraw.
			latestDirectionsId++;
			clearRoutePolylines();
		}

		function fitMapToPath(path) {
			if (!path || path.length === 0) {
				return;
			}
			const bounds = new LatLngBoundsCtor();
			path.forEach((point) => { bounds.extend(point); });
			map.fitBounds(bounds);
		}

		function clearMarkers() {
			markersArray.forEach((marker) => { marker.map = null; });
			markersArray = [];
			invalidateDirections();
		}

		function addMarkers(point) {
			clearMarkers();

			// Pharmacy marker (AdvancedMarkerElement with a custom <img>).
			const pharmacyMarker = new AdvancedMarkerElementCtor({
				position: point.position,
				map: map,
				title: point.title,
				content: buildMarkerContent(
					"/static/icons/pharmacy-pointer.svg",
					point.title,
				),
			});
			markersArray.push(pharmacyMarker);

			// Info Window for pharmacy marker. AdvancedMarkerElement uses
			// the new {anchor, map} open() signature. Build the content as
			// a DOM node so pharmacy fields are never parsed as HTML.
			const infoContent = document.createElement("div");
			const infoTitle = document.createElement("h3");
			infoTitle.textContent = point.title ?? "";
			const infoAddress = document.createElement("p");
			infoAddress.textContent = point.address ?? "";
			infoContent.append(infoTitle, infoAddress);
			const infoWindow = new google.maps.InfoWindow({
				content: infoContent,
			});
			pharmacyMarker.addListener("gmp-click", () => {
				infoWindow.open({ anchor: pharmacyMarker, map: map });
			});

			// Only draw "Konumumu" once we have a resolved location (real geo
			// or confirmed fallback). Avoids briefly pinning users to the
			// Eskişehir default while geolocation is still pending.
			if (userLocation) {
				const userLocationMarker = new AdvancedMarkerElementCtor({
					position: userLocation,
					map: map,
					title: "Konumumu",
					content: buildMarkerContent(
						"/static/icons/user-pointer.svg",
						"Konumumu",
					),
				});
				markersArray.push(userLocationMarker);
			}
		}

		function updatePharmacyList(pharmacies) {
			const pharmacyItems = document.getElementById("pharmacy-items");
			pharmacyItems.replaceChildren();

			pharmacies.forEach((pharmacy) => {
				const item = document.createElement("div");
				item.className =
					"pharmacy-item bg-primary-100 shadow-sm rounded p-4 flex flex-col md:flex-row items-start md:items-center justify-between";
				item.dataset.name = pharmacy.title ?? "";

				const infoWrap = document.createElement("div");
				infoWrap.className = "md:flex-grow";

				const titleEl = document.createElement("p");
				titleEl.className = "text-lg font-semibold mb-1";
				titleEl.textContent = pharmacy.title ?? "";

				const addressEl = document.createElement("p");
				addressEl.className = "text-sm text-gray-600";
				addressEl.append(
					document.createTextNode(pharmacy.address ?? ""),
					document.createElement("br"),
					document.createTextNode(
						` (${Number(pharmacy.travel_distance) || 0} metre uzaklıkta)`,
					),
				);

				infoWrap.append(titleEl, addressEl);

				const actionsWrap = document.createElement("div");
				actionsWrap.className = "mt-2 md:mt-0 flex items-center space-x-3";

				const statusEl = document.createElement("span");
				statusEl.className =
					"inline-block text-sm font-medium px-6 py-2 rounded bg-secondary border-2 border-secondary text-white";
				statusEl.textContent = pharmacy.status ?? "";

				const button = document.createElement("button");
				button.type = "button";
				button.className =
					"inline-block px-6 py-2 bg-primary-100 text-secondary rounded border-2 border-secondary text-sm";
				button.textContent = "Yol Tarifi";
				button.addEventListener("click", () => {
					showDirectionsToPharmacy(pharmacy);
				});

				actionsWrap.append(statusEl, button);
				item.append(infoWrap, actionsWrap);
				pharmacyItems.append(item);
			});
		}

		let swipeEventsAttached = false;

		function attachHammerSwipeEvents() {
			if (swipeEventsAttached) {
				return;
			}
			swipeEventsAttached = true;

			const containerElement = document.getElementById('pharmacy-list-container');
			const handle = document.getElementById('handle');
			const pharmacyListContainer = $('#pharmacy-list-container');

			let sheetExpanded = false;

			function toggleBottomSheet() {
				if (sheetExpanded) {
					pharmacyListContainer.removeClass('expanded').addClass('collapsed');
				} else {
					pharmacyListContainer.removeClass('collapsed').addClass('expanded');
				}
				sheetExpanded = !sheetExpanded;
			}

			containerElement.addEventListener('click', toggleBottomSheet);
			handle.addEventListener('click', toggleBottomSheet);

			const hammertime = new Hammer(containerElement);
			hammertime.get('swipe').set({ direction: Hammer.DIRECTION_VERTICAL });

			hammertime.on('swipeup', function () {
				if (!sheetExpanded) {
					pharmacyListContainer.removeClass('collapsed').addClass('expanded');
					sheetExpanded = true;
				}
			});

			hammertime.on('swipedown', function () {
				if (sheetExpanded) {
					pharmacyListContainer.removeClass('expanded').addClass('collapsed');
					sheetExpanded = false;
				}
			});
		}


		function fetchPharmacyPoints(location, callback) {
			$.ajax({
				url: '/get_pharmacy_points',
				method: 'POST',
				contentType: 'application/json',
				data: JSON.stringify({
					"lat": location.lat,
					"lng": location.lng,
				}),
				success: function (response) {
					callback(null, response);
				},
				error: function (error) {
					const message = error.responseJSON?.error || "An unknown server error occurred.";
					console.error("Error fetching pharmacy points:", message);
					// Do not mutate the header here: overlapping requests must
					// decide in the caller (via request id) whether this error
					// is still current.
					callback(message, null);
				}
			});
		}

		async function showDirectionsToMarker(point, origin) {
			if (!origin || !point || !RouteCtor || !map) {
				return;
			}
			const directionsId = ++latestDirectionsId;
			try {
				const { routes } = await RouteCtor.computeRoutes({
					origin: { lat: origin.lat, lng: origin.lng },
					destination: {
						lat: point.position.lat,
						lng: point.position.lng,
					},
					travelMode: "DRIVING",
					fields: ["path"],
				});
				if (directionsId !== latestDirectionsId) {
					return;
				}
				if (!routes?.length) {
					clearRoutePolylines();
					return;
				}
				clearRoutePolylines();
				routePolylines = routes[0].createPolylines();
				routePolylines.forEach((polyline) => { polyline.setMap(map); });
				fitMapToPath(routes[0].path);
			} catch (err) {
				if (directionsId === latestDirectionsId) {
					clearRoutePolylines();
				}
				console.error("Directions request failed:", err);
			}
		}

		function getUserLocation(callback) {
			if (!navigator.geolocation) {
				console.warn("Geolocation is not supported by this browser.");
				callback(null);
				return;
			}
			navigator.geolocation.getCurrentPosition(
				(position) => {
					callback({
						lat: position.coords.latitude,
						lng: position.coords.longitude,
					});
				},
				(error) => {
					console.warn(
						`Geolocation unavailable (code ${error.code}); using default city center.`,
					);
					callback(null);
				},
				{
					enableHighAccuracy: true,
					// Keep this short so a hung/denied prompt cannot block
					// pharmacy loading for minutes.
					timeout: 5000,
					maximumAge: 30000,
				}
			);
		}

		function showDirectionsToPharmacy(pharmacy, drawRoute = true, { collapseSheet = true } = {}) {
			selectedPharmacy = pharmacy;
			$('#selectedPharmacyName').text(pharmacy.title ?? "");
			$('#selectedPharmacyStatus').text(pharmacy.status ?? "");
			addMarkers(pharmacy);
			if (drawRoute) {
				showDirectionsToMarker(pharmacy, userLocation);
			}

			if (collapseSheet) {
				const pharmacyListContainer = $('#pharmacy-list-container');
				pharmacyListContainer.removeClass('expanded').addClass('collapsed');

				const scrollableArea = $('#pharmacy-scrollable-area');
				scrollableArea.scrollTop(0);
			}
		}

		function renderPharmacyResults(points, { drawRoute = false, preserveSelection = false } = {}) {
			if (!Array.isArray(points) || points.length === 0) {
				$('#selectedPharmacyName').text("Eczane bulunamadı");
				$('#selectedPharmacyStatus').text("");
				clearMarkers();
				console.error("No pharmacy points found.");
				return;
			}
			updatePharmacyList(points);
			attachHammerSwipeEvents();

			let pharmacy = points[0];
			if (preserveSelection && selectedPharmacy?.title) {
				const match = points.find((p) => p.title === selectedPharmacy.title);
				if (match) {
					pharmacy = match;
				}
			}

			const selectionChanged = pharmacy.title !== selectedPharmacy?.title;
			showDirectionsToPharmacy(pharmacy, drawRoute, {
				// Keep the sheet state if a late geo refresh is only updating
				// the same pharmacy the user already chose.
				collapseSheet: selectionChanged || !preserveSelection,
			});
		}

		// On page load: do not wait for geolocation before fetching pharmacies.
		// A slow/hung geo prompt previously left the UI stuck on
		// "Açık Eczaneler Yükleniyor" for up to 100s, and the fallback path
		// never updated the header even after pharmacies arrived.
		$(document).ready(function () {
			const defaultLocation = { lat: 39.7767, lng: 30.5206 }; // Eskişehir
			let latestRequestId = 0;

			window.mapsPromise.then(async () => {
				await initMap(defaultLocation);

				const loadForLocation = (location, { drawRoute = false, preserveSelection = false } = {}) => {
					const requestId = ++latestRequestId;
					fetchPharmacyPoints(location, (err, result) => {
						if (requestId !== latestRequestId) {
							return;
						}
						if (err) {
							$('#selectedPharmacyName').text("Hata");
							$('#selectedPharmacyStatus').text(err);
							return;
						}
						renderPharmacyResults(result?.points, {
							drawRoute,
							preserveSelection,
						});
					});
				};

				// Immediate fetch with city-center default so the list is never
				// blocked on the geolocation prompt. Leave userLocation unset
				// until geo resolves so "Konumumu" is not drawn at the default.
				loadForLocation(defaultLocation, { drawRoute: false });

				getUserLocation((location) => {
					if (!location) {
						userLocation = defaultLocation;
						if (selectedPharmacy) {
							addMarkers(selectedPharmacy);
						}
						return;
					}
					userLocation = location;
					map.setCenter(location);
					loadForLocation(location, {
						drawRoute: true,
						preserveSelection: true,
					});
				});
			}).catch((err) => {
				console.error("Failed to initialize map:", err);
				$('#selectedPharmacyName').text("Hata");
				$('#selectedPharmacyStatus').text("Harita yüklenemedi.");
			});
		});
        </script>
        <script>
		function getCSRFToken() {
			let cookieValue = null;
			const cookies = document.cookie.split(';');
			for (let i = 0; i < cookies.length; i++) {
				let cookie = cookies[i].trim();
				if (cookie.startsWith('csrftoken=')) {
					cookieValue = cookie.substring('csrftoken='.length, cookie.length);
					break;
				}
			}
			return cookieValue;
		}

		$.ajaxSetup({
			beforeSend: function (xhr, settings) {
				xhr.setRequestHeader("X-CSRFToken", getCSRFToken());
			}
});
        </script>
        <script type="application/ld+json">
		{
		  "@context": "https://schema.org",
		  "@type": "Organization",
		  "name": "Eczanerede",
		  "description": "Eskişehir’deki, İstanbul'daki ve Ankara'daki size en yakın açık ve nöbetçi eczaneler. Hızlı yol tarifi ve konum bilgileriyle, ihtiyacınız olduğunda en yakın eczaneye kolayca ulaşın.",
		  "address": {
			"@type": "PostalAddress",
			"addressCountry": "TR"
		  },
		  "url": "https://eczanerede.com/"
		}
        </script>
    </body>
    <style>
	#pharmacy-list-container {
		position: fixed;
		bottom: 0;
		left: 0;
		right: 0;
		transition: transform 0.3s ease-in-out;
		transform: translateY(50vh);
		will-change: transform;
		max-height: 80vh;
	}

	#handle {
		cursor: pointer;
		touch-action: drag-y;
	}

	#pharmacy-list-container.expanded {
		transform: translateY(0%);
	}

	#pharmacy-list-container.collapsed {
		transform: translateY(60vh);
	}

	.scrollable-area {
		overflow-y: hidden;
		padding-bottom: 1rem;
		/* Added as fallback */
	}

	#pharmacy-list-container.expanded .scrollable-area {
		overflow-y: auto;
		/* Compensate for title + handle height */
		max-height: calc(100% - 4.5rem);
		/* Adjust this value based on your actual title height */
	}

	html {
		overflow: hidden;
	}
    </style>
</html>
